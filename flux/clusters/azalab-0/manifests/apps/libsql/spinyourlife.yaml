apiVersion: apps/v1
kind: Deployment
metadata:
  name: spinyourlife-libsql
  namespace: libsql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spinyourlife-libsql
  template:
    metadata:
      labels:
        app: spinyourlife-libsql
    spec:
      containers:
        - name: libsql
          image: ghcr.io/tursodatabase/libsql-server:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: SQLD_NODE
              value: primary
            - name: SQLD_HTTP_LISTEN_ADDR
              value: 0.0.0.0:8080
            - name: SQLD_DB_PATH
              value: /var/lib/sqld/spinyourlife.db
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: data
              mountPath: /var/lib/sqld
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: spinyourlife-libsql-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: spinyourlife-libsql
  namespace: libsql
spec:
  selector:
    app: spinyourlife-libsql
  ports:
    - name: http
      port: 8080
      targetPort: 8080
