apiVersion: apps/v1
kind: Deployment
metadata:
  name: plarza-libsql
  namespace: plarza
spec:
  replicas: 1
  selector:
    matchLabels:
      app: plarza-libsql
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: plarza-libsql
    spec:
      securityContext:
        fsGroup: 666
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: clear-stale-replication-snapshots
          image: ghcr.io/tursodatabase/libsql-server:latest@sha256:07d5da358f37f7f327cc33c1cb5278e7892e04225f011a65a76049372a308982
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              rm -f /var/lib/sqld/plarza.db/dbs/*/snapshots/*.snap
          securityContext:
            runAsUser: 666
            runAsGroup: 666
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /var/lib/sqld
      containers:
        - name: libsql
          image: ghcr.io/tursodatabase/libsql-server:latest@sha256:07d5da358f37f7f327cc33c1cb5278e7892e04225f011a65a76049372a308982
          imagePullPolicy: IfNotPresent
          env:
            - name: SQLD_NODE
              value: primary
            - name: SQLD_HTTP_LISTEN_ADDR
              value: 0.0.0.0:8080
            - name: SQLD_DB_PATH
              value: /var/lib/sqld/plarza.db
            - name: SQLD_AUTH_JWT_KEY
              valueFrom:
                secretKeyRef:
                  name: plarza-libsql-auth
                  key: SQLD_AUTH_JWT_KEY
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "4"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              add:
                - CHOWN
                - SETGID
                - SETUID
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /var/lib/sqld
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: plarza-libsql-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: plarza-libsql
  namespace: plarza
spec:
  selector:
    app: plarza-libsql
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plarza
  namespace: plarza
spec:
  replicas: 1
  revisionHistoryLimit: 5
  progressDeadlineSeconds: 600
  selector:
    matchLabels:
      app: plarza
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: plarza
    spec:
      imagePullSecrets:
        - name: plarza-ghcr
      terminationGracePeriodSeconds: 40
      securityContext:
        runAsGroup: 1000
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: migrate
          image: ghcr.io/plarza/app:main-5ce8b06743e8-6@sha256:d31ae3350b360aad26adb562c914e3d8b682882b3e319067828d3c44a77688f0 # {"$imagepolicy": "flux-system:plarza-app"}
          imagePullPolicy: IfNotPresent
          command:
            - bun
            - database/scripts/migrate.ts
          envFrom:
            - secretRef:
                name: plarza-app
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
      containers:
        - name: app
          image: ghcr.io/plarza/app:main-5ce8b06743e8-6@sha256:d31ae3350b360aad26adb562c914e3d8b682882b3e319067828d3c44a77688f0 # {"$imagepolicy": "flux-system:plarza-app"}
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_ENV
              value: production
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: "3000"
            - name: BODY_SIZE_LIMIT
              value: 34M
            - name: SHUTDOWN_TIMEOUT
              value: "30"
            - name: TMPDIR
              value: /tmp
          envFrom:
            - secretRef:
                name: plarza-app
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "4"
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: plarza
  namespace: plarza
spec:
  selector:
    app: plarza
  ports:
    - name: http
      port: 3000
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: plarza-libsql
  namespace: plarza
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.priority: "100"
spec:
  ingressClassName: traefik
  rules:
    - host: db.plarza.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: plarza-libsql
                port:
                  number: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: plarza
  namespace: plarza
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: plarza.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: plarza
                port:
                  number: 3000
    - host: www.plarza.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: plarza
                port:
                  number: 3000
    - host: "*.plarza.com"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: plarza
                port:
                  number: 3000
