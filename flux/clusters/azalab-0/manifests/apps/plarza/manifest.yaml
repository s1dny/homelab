apiVersion: apps/v1
kind: Deployment
metadata:
  name: plarza-libsql
  namespace: plarza
spec:
  replicas: 1
  selector:
    matchLabels:
      app: plarza-libsql
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: plarza-libsql
    spec:
      securityContext:
        fsGroup: 666
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: libsql
          image: ghcr.io/tursodatabase/libsql-server@sha256:817fb6c6865d048a509f5c120905629fb9b5af20ad0c526cdc68a6d8793898ad
          imagePullPolicy: IfNotPresent
          env:
            - name: SQLD_NODE
              value: primary
            - name: SQLD_HTTP_LISTEN_ADDR
              value: 0.0.0.0:8080
            - name: SQLD_DB_PATH
              value: /var/lib/sqld/plarza.db
            - name: SQLD_AUTH_JWT_KEY
              valueFrom:
                secretKeyRef:
                  name: plarza-libsql-auth
                  key: SQLD_AUTH_JWT_KEY
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /var/lib/sqld
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: plarza-libsql-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: plarza-libsql
  namespace: plarza
spec:
  selector:
    app: plarza-libsql
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plarza
  namespace: plarza
spec:
  replicas: 1
  selector:
    matchLabels:
      app: plarza
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: plarza
    spec:
      terminationGracePeriodSeconds: 40
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: migrate
          image: localhost:5000/plarza:937c26f695ee
          imagePullPolicy: Always
          command:
            - bun
            - scripts/migrate.ts
          envFrom:
            - secretRef:
                name: plarza-app
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
      containers:
        - name: app
          image: localhost:5000/plarza:937c26f695ee
          imagePullPolicy: Always
          env:
            - name: NODE_ENV
              value: production
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: "3000"
            - name: ORIGIN
              value: https://plarza.com
            - name: BODY_SIZE_LIMIT
              value: 34M
            - name: SHUTDOWN_TIMEOUT
              value: "30"
            - name: TMPDIR
              value: /tmp
          envFrom:
            - secretRef:
                name: plarza-app
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "4"
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: plarza
  namespace: plarza
spec:
  selector:
    app: plarza
  ports:
    - name: http
      port: 3000
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: plarza
  namespace: plarza
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: plarza.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: plarza
                port:
                  number: 3000
    - host: www.plarza.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: plarza
                port:
                  number: 3000
    - host: "*.plarza.com"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: plarza
                port:
                  number: 3000
