apiVersion: batch/v1
kind: Job
metadata:
  name: plarza-clone-old-database
  namespace: plarza
spec:
  activeDeadlineSeconds: 7200
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: plarza-database-migration
    spec:
      restartPolicy: Never
      securityContext:
        runAsGroup: 0
        runAsUser: 0
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: clone
          image: ghcr.io/tursodatabase/libsql-server@sha256:817fb6c6865d048a509f5c120905629fb9b5af20ad0c526cdc68a6d8793898ad
          command:
            - /bin/bash
            - -ceu
            - --
          args:
            - |
              test -f /old/dbs/default/data
              test ! -e /target/plarza.db
              test ! -e /target/plarza.db.copying
              mkdir /target/plarza.db.copying
              tar -C /old --exclude='./dbs/default/data' -cpf - . | tar -C /target/plarza.db.copying -xpf -
              dd if=/old/dbs/default/data of=/target/plarza.db.copying/dbs/default/data bs=8M iflag=fullblock,direct oflag=direct conv=fsync status=progress
              chown --reference=/old/dbs/default/data /target/plarza.db.copying/dbs/default/data
              chmod --reference=/old/dbs/default/data /target/plarza.db.copying/dbs/default/data
              sync
              test "$(stat -c %s /old/dbs/default/data)" = "$(stat -c %s /target/plarza.db.copying/dbs/default/data)"
              mv /target/plarza.db.copying /target/plarza.db
              echo "Old database cloned without modifying the source"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "2"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: old-database
              mountPath: /old
              readOnly: true
            - name: target-database
              mountPath: /target
      volumes:
        - name: old-database
          hostPath:
            path: /srv/libsql/data/iku.db
            type: Directory
        - name: target-database
          persistentVolumeClaim:
            claimName: plarza-libsql-data-pvc
