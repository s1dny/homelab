apiVersion: batch/v1
kind: Job
metadata:
  name: plarza-merge-databases
  namespace: plarza
spec:
  activeDeadlineSeconds: 14400
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: plarza-database-migration
    spec:
      restartPolicy: Never
      securityContext:
        runAsGroup: 1000
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: merge
          image: localhost:5000/plarza:1398fb321674
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -ceu
            - --
          args:
            - |
              cp /migration-source/plarza-new.db /tmp/plarza-new.db
              exec bun scripts/merge-databases.ts
          env:
            - name: SOURCE_DATABASE_URL
              value: file:/tmp/plarza-new.db
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: plarza-app
                  key: DATABASE_URL
            - name: DATABASE_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: plarza-app
                  key: DATABASE_AUTH_TOKEN
            - name: RUN_QUICK_CHECK
              value: "1"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: migration-source
              mountPath: /migration-source
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: migration-source
          hostPath:
            path: /home/aiden/plarza/migration
            type: Directory
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
