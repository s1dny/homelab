apiVersion: apps/v1
kind: Deployment
metadata:
  name: spinyourlife
  namespace: libsql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spinyourlife
  template:
    metadata:
      labels:
        app: spinyourlife
    spec:
      containers:
        - name: spinyourlife
          image: localhost:5000/spinyourlife:latest
          imagePullPolicy: Always
          env:
            - name: LIBSQL_URL
              value: http://spinyourlife-libsql.libsql.svc.cluster.local:8080
            - name: PORT
              value: "3000"
            - name: APPLE_IAP_KEY_ID
              value: "S3RPF32X4Q"
            - name: APPLE_IAP_ISSUER_ID
              value: "570b1823-77bf-407c-b0a6-8b4c726f5741"
            - name: APPLE_IAP_BUNDLE_ID
              value: "life.spinyour"
            - name: APPLE_IAP_PRIVATE_KEY_B64
              valueFrom:
                secretKeyRef:
                  name: spinyourlife-iap
                  key: APPLE_IAP_PRIVATE_KEY_B64
          ports:
            - name: http
              containerPort: 3000
          livenessProbe:
            httpGet:
              path: /api/billing/products
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/billing/products
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: spinyourlife
  namespace: libsql
spec:
  selector:
    app: spinyourlife
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: spinyourlife
  namespace: libsql
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: spinyour.life
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: spinyourlife
                port:
                  number: 3000
