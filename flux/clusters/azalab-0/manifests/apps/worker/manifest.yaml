apiVersion: apps/v1
kind: Deployment
metadata:
  name: plarza-worker
  namespace: plarza
spec:
  replicas: 1
  revisionHistoryLimit: 5
  progressDeadlineSeconds: 600
  selector:
    matchLabels:
      app: plarza-worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: plarza-worker
    spec:
      imagePullSecrets:
        - name: plarza-ghcr
      terminationGracePeriodSeconds: 86400
      securityContext:
        runAsGroup: 10001
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: ghcr.io/plarza/worker:main-cbb150a5bc16-4@sha256:7cb5cc92382228885737454f727f336c021eda0a2c2145b896637b10386d47da # {"$imagepolicy": "flux-system:plarza-worker"}
          imagePullPolicy: IfNotPresent
          env:
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: plarza-worker
                  key: API_KEY
            - name: EXTENSION_API_KEY
              valueFrom:
                secretKeyRef:
                  name: plarza-worker
                  key: EXTENSION_API_KEY
            - name: DATABASE_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: plarza-app
                  key: DATABASE_AUTH_TOKEN
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: plarza-app
                  key: DATABASE_URL
          ports:
            - name: http
              containerPort: 3009
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            periodSeconds: 2
            timeoutSeconds: 3
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 3
          startupProbe:
            httpGet:
              path: /health/live
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 60
          resources:
            requests:
              cpu: "1"
              memory: 1Gi
            limits:
              cpu: "8"
              memory: 8Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: plarza-worker
  namespace: plarza
spec:
  selector:
    app: plarza-worker
  ports:
    - name: http
      port: 3009
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: plarza-worker
  namespace: plarza
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: worker.aza.network
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: plarza-worker
                port:
                  number: 3009
